version: '3.9'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: stravaxp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: stravaxp_user
      POSTGRES_PASSWORD: stravaxp_pass
      POSTGRES_DB: stravaxp
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U stravaxp_user -d stravaxp']
      interval: 10s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stravaxp_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://stravaxp_user:stravaxp_pass@db:5432/stravaxp
    ports:
      - '3000:3000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stravaxp_frontend
    restart: unless-stopped
    ports:
      - '4200:80'
    depends_on:
      - api
    environment:
      API_URL: http://localhost
      WS_URL: http://localhost

  nginx:
    image: nginx:alpine
    container_name: stravaxp_nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend

volumes:
  pgdata:
