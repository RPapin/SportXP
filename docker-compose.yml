version: '3.9'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: stravaxp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-stravaxp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stravaxp_pass}
      POSTGRES_DB: stravaxp
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-stravaxp_user} -d stravaxp']
      interval: 10s
      retries: 5
    networks:
      - sportxp_internal

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stravaxp_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-stravaxp_user}:${DB_PASSWORD:-stravaxp_pass}@db:5432/stravaxp
    networks:
      - sportxp_internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stravaxp_frontend
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - sportxp_internal

  nginx:
    image: nginx:alpine
    container_name: stravaxp_nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - sportxp_internal
      - bet_default      # réseau partagé avec Caddy

networks:
  sportxp_internal:
    driver: bridge
  bet_default:
    external: true   # réseau déjà créé par Caddy sur le VPS

volumes:
  pgdata:
